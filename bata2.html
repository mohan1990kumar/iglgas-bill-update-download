<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parivahan Vehicle Details - CORS Fixed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .search-area {
            padding: 30px;
            background: #f8f9fa;
        }

        .input-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            min-width: 250px;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 15px 30px;
            font-size: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            padding: 30px;
            display: none;
        }

        .vehicle-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .section {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .section-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            display: inline-block;
        }

        .detail-row {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .detail-label {
            font-weight: bold;
            color: #555;
        }

        .detail-value {
            color: #333;
            word-break: break-all;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin: 20px;
        }

        .proxy-note {
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 10px;
            margin-top: 15px;
            border-radius: 8px;
            font-size: 12px;
            color: #856404;
        }

        @media (max-width: 768px) {
            .detail-row {
                grid-template-columns: 1fr;
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚗 Parivahan Vehicle Details</h1>
            <p>Government Vehicle Registration Information System</p>
        </div>

        <div class="search-area">
            <div class="input-group">
                <input type="text" id="vehicleNo" placeholder="Enter Vehicle Number (e.g., GJ13AM6695)" autocomplete="off">
                <button onclick="searchVehicle()">🔍 Search Vehicle</button>
            </div>
            <div class="proxy-note">
                🔧 Using CORS Proxy to bypass browser restrictions. Your data is encrypted end-to-end.
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 20px;">Fetching vehicle details with AES encryption...</p>
        </div>

        <div class="results" id="results"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script>
        // Configuration
        const CLIENT_ID = "b91c303443f61b37106750823881cd2f";
        const CLIENT_SECRET = "de83eeeb148878ae375f28756492e8a0";
        const PARAM1 = "DsSFP37)0Mc#lG2Z";
        
        // CORS proxies (try multiple if one fails)
        const CORS_PROXIES = [
            'https://cors-anywhere.herokuapp.com/',
            'https://api.allorigins.win/raw?url=',
            'https://cors.bridged.cc/',
            'https://proxy.cors.sh/'
        ];
        
        let currentProxyIndex = 0;

        function getProxyUrl(originalUrl) {
            const proxy = CORS_PROXIES[currentProxyIndex];
            if (proxy.includes('allorigins')) {
                return `${proxy}${encodeURIComponent(originalUrl)}`;
            }
            return `${proxy}${originalUrl}`;
        }

        // AES Encryption function
        function aesEncryptECB(plaintext, keyBase64) {
            try {
                const key = CryptoJS.enc.Base64.parse(keyBase64);
                const encrypted = CryptoJS.AES.encrypt(plaintext, key, {
                    mode: CryptoJS.mode.ECB,
                    padding: CryptoJS.pad.Pkcs7
                });
                
                const ciphertext = encrypted.ciphertext.toString(CryptoJS.enc.Base64);
                const doubleEncoded = CryptoJS.enc.Base64.stringify(CryptoJS.enc.Utf8.parse(ciphertext));
                
                return doubleEncoded;
            } catch (error) {
                throw new Error(`Encryption error: ${error.message}`);
            }
        }

        // AES Decryption function
        function aesDecryptECB(ciphertextDoubleBase64, keyBase64) {
            try {
                const firstDecode = CryptoJS.enc.Base64.parse(ciphertextDoubleBase64).toString(CryptoJS.enc.Utf8);
                const ciphertext = CryptoJS.enc.Base64.parse(firstDecode);
                
                const key = CryptoJS.enc.Base64.parse(keyBase64);
                const decrypted = CryptoJS.AES.decrypt({
                    ciphertext: ciphertext
                }, key, {
                    mode: CryptoJS.mode.ECB,
                    padding: CryptoJS.pad.Pkcs7
                });
                
                return decrypted.toString(CryptoJS.enc.Utf8);
            } catch (error) {
                throw new Error(`Decryption error: ${error.message}`);
            }
        }

        // Step 1: Get Access Token
        async function getAccessToken() {
            const url = "https://delhigw.napix.gov.in/nic/parivahan/oauth2/token";
            const proxyUrl = getProxyUrl(url);
            
            const params = new URLSearchParams();
            params.append('grant_type', 'client_credentials');
            params.append('scope', 'napix');
            params.append('client_id', CLIENT_ID);
            params.append('client_secret', CLIENT_SECRET);
            
            try {
                const response = await fetch(proxyUrl, {
                    method: 'POST',
                    headers: {
                        'User-Agent': 'okhttp/4.9.2',
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'Origin': window.location.origin
                    },
                    body: params
                });
                
                const data = await response.json();
                if (data.access_token) {
                    return data.access_token;
                } else {
                    throw new Error("No access token in response");
                }
            } catch (error) {
                // Try next proxy
                if (currentProxyIndex < CORS_PROXIES.length - 1) {
                    currentProxyIndex++;
                    return getAccessToken();
                }
                throw new Error(`Failed to get token: ${error.message}`);
            }
        }

        // Step 2: Get State Code and Office Code
        async function getStateAndOfficeCode(vehicleNo, token) {
            const key1 = "MDIzNTE1NzEhfikjQComXg==";
            const plaintext = JSON.stringify({ regNo: vehicleNo });
            const encryptedData = aesEncryptECB(plaintext, key1);
            
            const url = "https://delhigw.napix.gov.in/nic/parivahan/mparivahan/wrapperapi/vahan/vahancapi/masterconfig/getstate_cdOffcd";
            const proxyUrl = getProxyUrl(url);
            
            const response = await fetch(proxyUrl, {
                method: 'POST',
                headers: {
                    'User-Agent': 'okhttp/4.9.2',
                    'Accept': 'application/json',
                    'Content-Type': 'application/json',
                    'timestamp': Date.now().toString(),
                    'Authorization': `Bearer ${token}`,
                    'Param2': '2.0.133',
                    'Param1': PARAM1,
                    'Origin': window.location.origin
                },
                body: JSON.stringify({ data: encryptedData })
            });
            
            const data = await response.json();
            if (data.data) {
                const decrypted = aesDecryptECB(data.data, key1);
                return JSON.parse(decrypted);
            } else {
                throw new Error("No data in response");
            }
        }

        // Step 3: Get Mobile Number
        async function getMobileNumber(vehicleNo, chassisNo, stateCode, officeCode, token) {
            const key2 = "MDgyMzE1NzEhfikjQComXg==";
            const plaintext = JSON.stringify({
                regnNo: vehicleNo,
                stateCode: stateCode,
                chassisNo: chassisNo,
                officeCode: officeCode
            });
            
            const encryptedData = aesEncryptECB(plaintext, key2);
            
            const url = "https://delhigw.napix.gov.in/nic/parivahan/mparivahan/wrapperapi/vahan/vahancapi/updatemobile/getMobileNo";
            const proxyUrl = getProxyUrl(url);
            
            const response = await fetch(proxyUrl, {
                method: 'POST',
                headers: {
                    'User-Agent': 'okhttp/4.9.2',
                    'Accept': 'application/json',
                    'Content-Type': 'application/json',
                    'timestamp': Date.now().toString(),
                    'Authorization': `Bearer ${token}`,
                    'Param2': '2.0.133',
                    'Param1': PARAM1,
                    'Origin': window.location.origin
                },
                body: JSON.stringify({ data: encryptedData })
            });
            
            const data = await response.json();
            if (data.data) {
                const decrypted = aesDecryptECB(data.data, key2);
                const result = JSON.parse(decrypted);
                return result.data?.mobileNo || "Not found";
            } else {
                throw new Error("No data in response");
            }
        }

        // Main search function
        async function searchVehicle() {
            const vehicleNo = document.getElementById('vehicleNo').value.trim().toUpperCase();
            
            if (!vehicleNo) {
                alert("Please enter a vehicle number!");
                return;
            }
            
            // Reset UI
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            document.getElementById('results').innerHTML = '';
            currentProxyIndex = 0;
            
            try {
                console.log(`🚗 Searching for vehicle: ${vehicleNo}`);
                
                // Step 1: Get Token
                const token = await getAccessToken();
                console.log("✅ Access token obtained");
                
                // Step 2: Get State & Office Code
                const stateOfficeData = await getStateAndOfficeCode(vehicleNo, token);
                console.log("✅ State & office code obtained");
                
                // Step 3: Get Mobile Number
                const mobileNo = await getMobileNumber(vehicleNo, "1", stateOfficeData.stateCd, stateOfficeData.offCd, token);
                console.log("✅ Mobile number obtained");
                
                // Display results
                displayResults(vehicleNo, mobileNo, stateOfficeData);
                
            } catch (error) {
                console.error("Error:", error);
                displayError(error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('results').style.display = 'block';
            }
        }
        
        function displayResults(vehicleNo, mobileNo, stateOfficeData) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="vehicle-card">
                    <div class="section">
                        <div class="section-title">🚗 VEHICLE INFORMATION</div>
                        <div class="detail-row">
                            <div class="detail-label">🔢 Registration Number:</div>
                            <div class="detail-value">${vehicleNo}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">📍 State Code:</div>
                            <div class="detail-value">${stateOfficeData.stateCd || 'N/A'}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">🏢 Office Code:</div>
                            <div class="detail-value">${stateOfficeData.offCd || 'N/A'}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">📱 Registered Mobile:</div>
                            <div class="detail-value">${mobileNo}</div>
                        </div>
                    </div>
                    
                    <div class="section">
                        <div class="section-title">ℹ️ Additional Details</div>
                        <div class="detail-row">
                            <div class="detail-label">🔐 Encryption:</div>
                            <div class="detail-value">AES-256-ECB with double Base64</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">🌐 API Source:</div>
                            <div class="detail-value">Parivahan Sewa, Government of India</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">🔄 Proxy Used:</div>
                            <div class="detail-value">${CORS_PROXIES[currentProxyIndex]}</div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function displayError(message) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="error">
                    <strong>❌ Error Occurred</strong><br><br>
                    ${message}<br><br>
                    <strong>Possible Solutions:</strong><br>
                    1. Click on <a href="https://cors-anywhere.herokuapp.com/" target="_blank">CORS Anywhere</a> and request temporary access<br>
                    2. Try after some time<br>
                    3. Check vehicle number format<br>
                    4. Use VPN if in restricted network<br><br>
                    <small>Note: Some CORS proxies require one-time activation</small>
                </div>
            `;
        }
        
        // Enter key support
        document.getElementById('vehicleNo').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchVehicle();
            }
        });
        
        // Instruction for CORS Anywhere activation
        console.log("If using CORS Anywhere, first visit: https://cors-anywhere.herokuapp.com/ and request temporary access");
    </script>
</body>
</html>
