<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parivahan Vehicle Details - Working Version</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .search-area {
            padding: 30px;
            background: #f8f9fa;
        }

        .input-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .input-field {
            flex: 1;
            min-width: 250px;
        }

        .input-field label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
            font-size: 14px;
        }

        .input-field input {
            width: 100%;
            padding: 12px 15px;
            font-size: 14px;
            border: 2px solid #ddd;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .input-field input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            align-self: flex-end;
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            height: 45px;
        }

        .proxy-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .proxy-btn {
            background: #6c757d;
            padding: 8px 15px;
            font-size: 12px;
            height: auto;
        }

        .proxy-btn.active {
            background: #28a745;
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results {
            padding: 30px;
            display: none;
        }

        .vehicle-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .section {
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .section-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
            display: inline-block;
        }

        .detail-row {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .detail-label {
            font-weight: bold;
            color: #555;
        }

        .detail-value {
            color: #333;
            word-break: break-all;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin: 20px;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .detail-row {
                grid-template-columns: 1fr;
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚗 Parivahan Vehicle Details</h1>
            <p>Working Version with Multiple Proxy Support</p>
        </div>

        <div class="search-area">
            <div class="input-group">
                <div class="input-field">
                    <label>🔢 Vehicle Number *</label>
                    <input type="text" id="vehicleNo" placeholder="GJ13AM6695" value="GJ13AM6695">
                </div>
                <div class="input-field">
                    <label>🔧 Chassis Number</label>
                    <input type="text" id="chassisNo" placeholder="Last 5 digits" value="1">
                </div>
                <button onclick="searchVehicle()">🔍 Search</button>
            </div>
            
            <div class="proxy-buttons">
                <button class="proxy-btn" onclick="setProxy('corsproxy')">🌐 CORS Proxy</button>
                <button class="proxy-btn" onclick="setProxy('allorigins')">🔄 All Origins</button>
                <button class="proxy-btn" onclick="setProxy('corsbridge')">🌉 CORS Bridge</button>
                <button class="proxy-btn" onclick="setProxy('thingsproxy')">⚡ ThingsProxy</button>
            </div>
            <p style="font-size: 12px; color: #666; margin-top: 10px;">💡 Try different proxies if one doesn't work</p>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p id="loadingText">Initializing...</p>
        </div>

        <div class="results" id="results"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script>
        // Configuration
        const CLIENT_ID = "b91c303443f61b37106750823881cd2f";
        const CLIENT_SECRET = "de83eeeb148878ae375f28756492e8a0";
        const PARAM1 = "DsSFP37)0Mc#lG2Z";
        
        let currentProxy = 'corsproxy';
        
        function setProxy(proxy) {
            currentProxy = proxy;
            document.querySelectorAll('.proxy-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            console.log(`Switched to proxy: ${proxy}`);
        }

        function getProxyUrl(originalUrl) {
            const proxies = {
                'corsproxy': `https://corsproxy.io/?${encodeURIComponent(originalUrl)}`,
                'allorigins': `https://api.allorigins.win/raw?url=${encodeURIComponent(originalUrl)}`,
                'corsbridge': `https://cors.bridged.cc/${originalUrl}`,
                'thingsproxy': `https://cors.things.sh/${originalUrl}`
            };
            return proxies[currentProxy] || proxies['corsproxy'];
        }

        function aesEncryptECB(plaintext, keyBase64) {
            const key = CryptoJS.enc.Base64.parse(keyBase64);
            const encrypted = CryptoJS.AES.encrypt(plaintext, key, {
                mode: CryptoJS.mode.ECB,
                padding: CryptoJS.pad.Pkcs7
            });
            const ciphertext = encrypted.ciphertext.toString(CryptoJS.enc.Base64);
            return CryptoJS.enc.Base64.stringify(CryptoJS.enc.Utf8.parse(ciphertext));
        }

        function aesDecryptECB(ciphertextDoubleBase64, keyBase64) {
            const firstDecode = CryptoJS.enc.Base64.parse(ciphertextDoubleBase64).toString(CryptoJS.enc.Utf8);
            const ciphertext = CryptoJS.enc.Base64.parse(firstDecode);
            const key = CryptoJS.enc.Base64.parse(keyBase64);
            const decrypted = CryptoJS.AES.decrypt({ ciphertext: ciphertext }, key, {
                mode: CryptoJS.mode.ECB,
                padding: CryptoJS.pad.Pkcs7
            });
            let result = decrypted.toString(CryptoJS.enc.Utf8);
            result = result.replace(/\x00/g, '').replace(/[\x01-\x0F]/g, '');
            return result;
        }

        async function getAccessToken() {
            const url = "https://delhigw.napix.gov.in/nic/parivahan/oauth2/token";
            
            const params = new URLSearchParams();
            params.append('grant_type', 'client_credentials');
            params.append('scope', 'napix');
            params.append('client_id', CLIENT_ID);
            params.append('client_secret', CLIENT_SECRET);
            
            // For token endpoint, use direct fetch (no proxy needed sometimes)
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: params
                });
                
                if (response.ok) {
                    const data = await response.json();
                    return data.access_token;
                }
            } catch(e) {
                console.log("Direct fetch failed, trying proxy...");
            }
            
            // Try with proxy
            const proxyUrl = getProxyUrl(url);
            const response = await fetch(proxyUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: params
            });
            
            const data = await response.json();
            if (data.access_token) {
                return data.access_token;
            } else if (data.contents) {
                const parsed = JSON.parse(data.contents);
                return parsed.access_token;
            }
            throw new Error("Failed to get token");
        }

        async function getStateAndOfficeCode(vehicleNo, token) {
            const key1 = "MDIzNTE1NzEhfikjQComXg==";
            const plaintext = JSON.stringify({ regNo: vehicleNo });
            const encryptedData = aesEncryptECB(plaintext, key1);
            
            const url = "https://delhigw.napix.gov.in/nic/parivahan/mparivahan/wrapperapi/vahan/vahancapi/masterconfig/getstate_cdOffcd";
            const proxyUrl = getProxyUrl(url);
            
            const response = await fetch(proxyUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`,
                    'Param2': '2.0.133',
                    'Param1': PARAM1
                },
                body: JSON.stringify({ data: encryptedData })
            });
            
            let data = await response.json();
            if (data.contents) {
                data = JSON.parse(data.contents);
            }
            
            if (data.data) {
                const decrypted = aesDecryptECB(data.data, key1);
                return JSON.parse(decrypted);
            }
            throw new Error("Failed to get state/office code");
        }

        async function getMobileNumber(vehicleNo, chassisNo, stateCode, officeCode, token) {
            const key2 = "MDgyMzE1NzEhfikjQComXg==";
            const plaintext = JSON.stringify({
                regnNo: vehicleNo,
                stateCode: stateCode,
                chassisNo: chassisNo,
                officeCode: officeCode
            });
            
            const encryptedData = aesEncryptECB(plaintext, key2);
            
            const url = "https://delhigw.napix.gov.in/nic/parivahan/mparivahan/wrapperapi/vahan/vahancapi/updatemobile/getMobileNo";
            const proxyUrl = getProxyUrl(url);
            
            const response = await fetch(proxyUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`,
                    'Param2': '2.0.133',
                    'Param1': PARAM1
                },
                body: JSON.stringify({ data: encryptedData })
            });
            
            let data = await response.json();
            if (data.contents) {
                data = JSON.parse(data.contents);
            }
            
            if (data.data) {
                const decrypted = aesDecryptECB(data.data, key2);
                const result = JSON.parse(decrypted);
                return result.data?.mobileNo || "Not found";
            }
            throw new Error("Failed to get mobile number");
        }

        async function searchVehicle() {
            const vehicleNo = document.getElementById('vehicleNo').value.trim().toUpperCase();
            const chassisNo = document.getElementById('chassisNo').value.trim() || "1";
            
            if (!vehicleNo) {
                alert("Please enter vehicle number!");
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            const loadingText = document.getElementById('loadingText');
            
            try {
                loadingText.innerHTML = "🔑 Getting access token...";
                const token = await getAccessToken();
                
                loadingText.innerHTML = "📍 Getting state & office code...";
                const stateOfficeData = await getStateAndOfficeCode(vehicleNo, token);
                
                loadingText.innerHTML = "📱 Getting mobile number...";
                const mobileNo = await getMobileNumber(vehicleNo, chassisNo, stateOfficeData.stateCd, stateOfficeData.offCd, token);
                
                displayResults(vehicleNo, chassisNo, mobileNo, stateOfficeData);
                
            } catch (error) {
                displayError(error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('results').style.display = 'block';
            }
        }
        
        function displayResults(vehicleNo, chassisNo, mobileNo, stateOfficeData) {
            document.getElementById('results').innerHTML = `
                <div class="vehicle-card">
                    <div class="section">
                        <div class="section-title">✅ VEHICLE FOUND</div>
                        <div class="detail-row">
                            <div class="detail-label">Registration Number:</div>
                            <div class="detail-value">${vehicleNo}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Chassis Number Used:</div>
                            <div class="detail-value">${chassisNo}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">State Code:</div>
                            <div class="detail-value">${stateOfficeData.stateCd || 'N/A'}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Office Code:</div>
                            <div class="detail-value">${stateOfficeData.offCd || 'N/A'}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Registered Mobile:</div>
                            <div class="detail-value"><strong style="color: green;">${mobileNo}</strong></div>
                        </div>
                    </div>
                    <div class="section">
                        <div class="section-title">ℹ️ Info</div>
                        <div class="detail-row">
                            <div class="detail-label">Proxy Used:</div>
                            <div class="detail-value">${currentProxy}</div>
                        </div>
                        <div class="detail-row">
                            <div class="detail-label">Encryption:</div>
                            <div class="detail-value">AES-256-ECB</div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function displayError(message) {
            document.getElementById('results').innerHTML = `
                <div class="error">
                    <strong>❌ Error</strong><br><br>
                    ${message}<br><br>
                    <strong>Solutions:</strong><br>
                    1. Try a different proxy from the buttons above<br>
                    2. Check if vehicle number is correct<br>
                    3. Try after some time
                </div>
            `;
        }
    </script>
</body>
</html>
